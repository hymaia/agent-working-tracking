<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Dashboard Tracking</title>
  <meta name="description"
    content="Agent Working Tracking dashboard: code hotspots, interaction graphs, and full chat history.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/static/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
</head>

<body>

  <header class="topbar">
    <div class="topbar-content">
      <h1>Agent Dashboard Tracking</h1>
      <span class="badge" style="margin-top: 4px;">Project: {{ repo_name }}</span>
    </div>
    <div class="topbar-actions" style="display:flex;flex-direction:column;align-items:center;gap:5px;position:absolute;left:50%;transform:translateX(-50%);">
      <div style="display:flex;gap:8px;align-items:flex-end;">
        <div style="display:flex;flex-direction:column;gap:4px;">
          <label for="taskSearch" class="task-select-label" style="display:block;text-align:center;">Search</label>
          <input id="taskSearch" type="text" class="task-search" placeholder="Filter tasks…" list="taskSearchList" autocomplete="off">
          <datalist id="taskSearchList"></datalist>
        </div>
        <div style="display:flex;flex-direction:column;gap:4px;">
          <label for="taskSelect" class="task-select-label" style="display:block;text-align:center;">Task</label>
          <select id="taskSelect" class="task-select"></select>
        </div>
      </div>
    </div>
          <span class="badge">AI Assistant: {{ env_ide }}</span>
        </div>
  </header>

  <main class="dashboard-root">
    <aside class="sidebar fade-in">
      <h2 class="badge">Agent Task listing</h2>
      <div class="sidebar-header">
        <div class="sidebar-header-top">
        </div>
       
      </div>
      <div id="taskList" class="task-list">
        <!-- Tasks will be rendered here -->
      </div>
    </aside>

    <div class="main-content">
      <section class="card fade-in quality-bar" id="qualityBar">
        <div class="card-header">
          <h2>Code Quality</h2>
          <span class="badge">Metrics</span>
        </div>
        <div class="quality-stats">
          <div class="stat-card">
            <span class="stat-value" id="qFiles">—</span>
            <span class="stat-label">Files Analyzed</span>
          </div>
          <div class="stat-card">
            <span class="stat-value" id="qClean">—</span>
            <span class="stat-label">Clean Files (ruff)</span>
          </div>
          <div class="stat-card">
            <span class="stat-value" id="qViolations">—</span>
            <span class="stat-label">Violations</span>
          </div>
          <div class="stat-card">
            <span class="stat-value" id="qAvgLen">—</span>
            <span class="stat-label">Avg. Fn Length</span>
          </div>
        </div>
      </section>

      <section class="card fade-in">
        <div class="card-header">
          <h2>Cyclomatic &amp; Git Churn Graph</h2>
          <span class="badge">Hotspots</span>
        </div>
        <div class="chart-container">
          <canvas id="hotspotChart"></canvas>
        </div>
      </section>

      <section class="card fade-in" style="animation-delay: 0.1s;">
        <div class="card-header">
          <h2>Interaction Graph</h2>
          <span class="badge">Dependencies</span>
        </div>
        <div class="chart-container">
          <div id="interactionNetwork" style="width: 100%; height: 100%;"></div>
        </div>
      </section>
    </div>
  </main>

  <!-- Injection of data sent by FastAPI -->
  <script>
    window.metrics = {{ metrics | tojson | safe }};
    window.graphData = {{ graph_data | tojson | safe }};
    window.agentTasks = {{ agent_tasks | tojson | safe }};
    window.qualityData = {{ quality_data | tojson | safe }};
  </script>
  <script src="/static/app.js" defer></script>

</body>

</html>
